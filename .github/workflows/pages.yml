name: Déploiement GitHub Pages

# Déploie le site statique sur GitHub Pages.
# Se déclenche sur la branche principale (après merge) et à la demande.
#
# Prérequis (réglages du dépôt, à faire une seule fois) :
#   1. Dépôt privé : GitHub Pages nécessite un plan payant. Sinon, rendre le
#      dépôt public (Settings → General → Danger Zone → Change visibility).
#   2. Settings → Actions → General → Workflow permissions :
#      cocher « Read and write permissions ».
# Une fois ces réglages faits, ce workflow active Pages et déploie tout seul.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer GitHub Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer le contenu statique
        run: |
          mkdir -p dist
          cp -r index.html css js dist/

      - name: Uploader l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
